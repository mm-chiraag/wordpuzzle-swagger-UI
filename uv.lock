version = 1
requires-python = ">=3.10"

[[package]]
name = "wordpuzzle-openenv"
version = "0.1.0"
source = { virtual = "." }
dependencies = [
  { name = "fastapi" },
  { name = "uvicorn" },
  { name = "openai" },
  { name = "requests" },
  { name = "pydantic" },
  { name = "openenv-core" },
]

[package.metadata]
requires-dist = [
  { name = "fastapi" },
  { name = "uvicorn" },
  { name = "openai" },
  { name = "requests" },
  { name = "pydantic" },
  { name = "openenv-core", specifier = ">=0.2.0" },
]
